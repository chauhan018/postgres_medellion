name: Run dbt - main_model

on:
  schedule:
    - cron: "15 6 * * *"   # runs daily at 06:00 UTC — adjust as needed
  workflow_dispatch: {}   # allows manual trigger

jobs:
  dbt-run:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ./  # profiles.yml will be generated in the repo root during the job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-postgres
        run: pip install dbt-postgres

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          dbt_project:
            target: dev
            outputs:
              dev:
                type: postgres
                host: ${{ secrets.DBT_HOST }}
                user: ${{ secrets.DBT_USER }}
                password: ${{ secrets.DBT_PASSWORD }}
                port: ${{ secrets.DBT_PORT }}
                dbname: ${{ secrets.DBT_DBNAME }}
                schema: dbt_dev
                threads: 4
          EOF

      - name: Install dbt packages (if any)
        run: dbt deps
        working-directory: dbt_project

      - name: Debug connection
        run: dbt debug
        working-directory: dbt_project

      - name: Run first model
        run: dbt run --select main_table
        working-directory: dbt_project